name: validate

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # 'brands' only matters for inclusion in the default HACS store; this is
          # installed as a custom repository, so skip it.
          ignore: brands
