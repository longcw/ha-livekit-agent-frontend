name: release

# On a version tag, build the card fresh and cut a GitHub release. HACS installs the repo
# source at the tag (which includes the committed, freshly built bundle), then offers the
# update to users.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: card/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: card
      - run: pnpm build
        working-directory: card
      - name: Verify committed bundle matches the build
        run: |
          if ! git diff --quiet custom_components/livekit_voice/frontend/livekit-voice-card.js; then
            echo "::warning::committed bundle differs from a fresh build for this tag"
          fi
      # Native gh CLI instead of a third-party action: it retries transient GitHub API
      # failures (the release step has flaked during GitHub incidents) and is idempotent, so
      # re-running the tag doesn't error on an already-created release.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists — skipping"
            exit 0
          fi
          for i in 1 2 3; do
            if gh release create "$tag" --verify-tag --generate-notes; then
              exit 0
            fi
            echo "::warning::release attempt $i for $tag failed; retrying in 10s"
            sleep 10
          done
          echo "::error::failed to create release $tag after 3 attempts"
          exit 1
